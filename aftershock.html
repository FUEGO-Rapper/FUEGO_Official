<!DOCTYPE html>
<html>
<head>
    <title>AFTERSHOCK</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- INTRO SCREEN -->
<div id="introScreen">
    <div class="introText">AFTERSHOCK</div>
</div>

<!-- IMPACT SCREEN -->
<div id="impactScreen">
    <div id="impactFlash"></div>
    <div id="impactCircle"></div>
    <div id="impactTitle">AFTERSHOCK</div>
</div>

<canvas id="fireCanvas"></canvas>

<nav>
    <a href="index.html">Home</a>
    <a href="aftershock.html">AFTERSHOCK</a>
</nav>

<header>
    <h1>AFTERSHOCK</h1>
    <p>Something is coming...</p>
</header>

<section>
    <div class="card">
        <h2>Release Window</h2>
        <p><strong>Spring 2027</strong></p>
    </div>
</section>

<section>
    <div class="card">
        <h2>Info</h2>
        <p>
            The impact has already happened.<br>
            The aftermath is still forming.<br>
            What comes next will change everything.
        </p>
    </div>
</section>

<footer>
    Keep watching.
</footer>

<script>
const canvas = document.getElementById("fireCanvas");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const particles = [];

function createParticle(){
    return {
        x: Math.random() * canvas.width,
        y: canvas.height + Math.random() * 50,
        size: Math.random() * 4 + 1,
        speedY: Math.random() * 2 + 1,
        speedX: (Math.random() - 0.5),
        alpha: Math.random() * 0.5 + 0.2
    };
}

for(let i = 0; i < 80; i++){
    particles.push(createParticle());
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let i = 0; i < particles.length; i++){
        let p = particles[i];

        p.y -= p.speedY;
        p.x += p.speedX;

        if(p.y < -10){
            particles[i] = createParticle();
            continue;
        }

        ctx.beginPath();
        ctx.fillStyle = `rgba(255,100,0,${p.alpha})`;
        ctx.shadowBlur = 15;
        ctx.shadowColor = "#ff4d00";
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fill();
    }

    requestAnimationFrame(draw);
}
draw();

/* =========================
   CINEMATIC SEQUENCE CONTROL
========================= */

const intro = document.getElementById("introScreen");
const impact = document.getElementById("impactScreen");

/* STEP 1: hide intro after animation */
setTimeout(() => {
    intro.style.display = "none";

    /* STEP 2: trigger impact */
    impact.classList.add("active");

}, 3000);

/* STEP 3: remove impact after it finishes */
setTimeout(() => {
    impact.style.display = "none";
}, 4500);

</script>

</body>
</html>
